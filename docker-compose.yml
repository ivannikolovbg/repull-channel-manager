services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: repull
      POSTGRES_PASSWORD: repull
      POSTGRES_DB: repull_cm
    ports:
      - '5432:5432'
    volumes:
      - repull_cm_pgdata:/var/lib/postgresql/data

volumes:
  repull_cm_pgdata:
